name: Islamic Content Automation

# ─── STEP 6.3 equivalent: Schedule Trigger ───────────────────────────────────
# Runs daily at 20:00 UTC = 8 PM London GMT (9 PM during BST/summer).
# workflow_dispatch lets you click "Run workflow" in the GitHub Actions UI
# to trigger it manually at any time (equivalent to Make.com's "Run once" button).
on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ─── STEP 6.4 equivalent: Run the automation ───────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t islamic-automation .

      # The container runs the full script and exits when done.
      # No sleep step needed — GitHub Actions waits for the container to finish
      # before moving to the next step (equivalent to Make.com's Sleep module).
      - name: Run automation
        id: run_automation
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INSTAGRAM_VIDEO_HOST_URL: ${{ secrets.INSTAGRAM_VIDEO_HOST_URL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          docker run --rm \
            -e YOUTUBE_API_KEY \
            -e YOUTUBE_CHANNEL_ID \
            -e CLAUDE_API_KEY \
            -e INSTAGRAM_BUSINESS_ACCOUNT_ID \
            -e INSTAGRAM_ACCESS_TOKEN \
            -e GOOGLE_CREDENTIALS_JSON \
            -e UNSPLASH_ACCESS_KEY \
            -e INSTAGRAM_VIDEO_HOST_URL \
            -e YOUTUBE_CLIENT_ID \
            -e YOUTUBE_CLIENT_SECRET \
            -e YOUTUBE_REFRESH_TOKEN \
            islamic-automation

      # ─── STEP 6.6 equivalent: Email Notification on success ────────────────
      # Uses Gmail SMTP. Requires two GitHub secrets:
      #   GMAIL_USERNAME  — your Gmail address (e.g. zfkhan321@gmail.com)
      #   GMAIL_APP_PASSWORD — a Gmail App Password (not your normal password).
      #     Generate one at: Google Account → Security → 2-Step Verification → App passwords
      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: Islamic Automation <${{ secrets.GMAIL_USERNAME }}>
          subject: "✅ Islamic Content Video Generated"
          body: |
            Your daily Islamic content video has been generated and uploaded!

            Check YouTube: https://www.youtube.com/@${{ secrets.YOUTUBE_CHANNEL_ID }}

            Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ─── Bonus: Email on failure so you know if something broke ────────────
      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: Islamic Automation <${{ secrets.GMAIL_USERNAME }}>
          subject: "❌ Islamic Automation Failed"
          body: |
            Something went wrong with today's automation run.

            View the error logs here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
