name: Islamic Content Automation

on:
  schedule:
    - cron: "0 16 * * *"   # 5 PM London BST (4 PM GMT in winter)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation warning

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t islamic-automation .

      - name: Run automation
        id: run_automation
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NASHEED_URL: ${{ secrets.NASHEED_URL }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
        run: |
          docker run --rm \
            -e YOUTUBE_API_KEY \
            -e YOUTUBE_CHANNEL_ID \
            -e GROQ_API_KEY \
            -e PEXELS_API_KEY \
            -e NASHEED_URL \
            -e INSTAGRAM_BUSINESS_ACCOUNT_ID \
            -e INSTAGRAM_ACCESS_TOKEN \
            -e FACEBOOK_PAGE_ACCESS_TOKEN \
            -e GOOGLE_CREDENTIALS_JSON \
            -e UNSPLASH_ACCESS_KEY \
            -e YOUTUBE_CLIENT_ID \
            -e YOUTUBE_CLIENT_SECRET \
            -e YOUTUBE_REFRESH_TOKEN \
            -e GCS_BUCKET_NAME \
            islamic-automation

      # Email steps only run if GMAIL_APP_PASSWORD secret is set.
      # To enable: add GMAIL_APP_PASSWORD to GitHub Secrets (Google Account → Security → App passwords).
      # The to/from address is hardcoded so it works even if GMAIL_USERNAME secret isn't set.
      - name: Send success email
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: zaidkhanuk2019@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: zaidkhanuk2019@gmail.com
          from: Islamic Automation <zaidkhanuk2019@gmail.com>
          subject: "✅ Islamic Content Video Generated"
          body: |
            Your daily Islamic content video has been generated and uploaded to @ServantUnseen!

            Check YouTube: https://www.youtube.com/@ServantUnseen

            Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: zaidkhanuk2019@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: zaidkhanuk2019@gmail.com
          from: Islamic Automation <zaidkhanuk2019@gmail.com>
          subject: "❌ Islamic Automation Failed"
          body: |
            Something went wrong with today's automation run.

            View the error logs here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
